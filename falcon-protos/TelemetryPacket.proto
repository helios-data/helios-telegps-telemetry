syntax = "proto3";

enum FlightState {
    STANDBY = 0;
    ASCENT = 1;
    MACH_LOCK = 2;
    DROGUE_DESCENT = 3;
    MAIN_DESCENT = 4;
    LANDED = 5;
}

message TelemetryPacket {
    // Packet metadata
    uint32 counter = 1;
    uint32 timestamp_ms = 2;

    // Flight state
    FlightState state = 3;

    // IMU data
    float accel_x = 4;
    float accel_y = 5;
    float accel_z = 6;
    float gyro_x = 7;
    float gyro_y = 8;
    float gyro_z = 9;

    // Kalman filter estimates
    float kf_altitude = 10;
    float kf_velocity = 11;
    float kf_alt_variance = 22;
    float kf_vel_variance = 23;

    // Barometer health
    bool baro0_healthy = 12;
    bool baro1_healthy = 13;

    // Barometer 0 detailed data
    float baro0_pressure = 24;
    float baro0_temperature = 25;
    float baro0_altitude = 26;
    float baro0_nis = 27;
    uint32 baro0_faults = 28;

    // Barometer 1 detailed data
    float baro1_pressure = 29;
    float baro1_temperature = 30;
    float baro1_altitude = 31;
    float baro1_nis = 32;
    uint32 baro1_faults = 33;

    // Reference
    float ground_altitude = 14;

    // GPS data
    float gps_latitude = 15;
    float gps_longitude = 16;
    float gps_altitude = 17;
    float gps_speed = 18;
    uint32 gps_sats = 19;
    uint32 gps_fix = 20;
}
