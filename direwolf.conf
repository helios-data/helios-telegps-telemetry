# Direwolf APRS receive-only configuration
# ─────────────────────────────────────────
# AUDIO_DEVICE_PLACEHOLDER is substituted at container start by entrypoint.sh
# from the AUDIO_DEVICE env var (default: hw:0,0).
#
# To find your device inside the container, run:
#   aplay -l      — list playback (to confirm ALSA sees the card)
#   arecord -l    — list capture devices
#
# Common values:
#   hw:0,0        — first card, first device (most common)
#   hw:1,0        — second card (if your system has a built-in card at 0)
#   plughw:0,0    — with automatic format conversion (use if hw:0,0 fails)

ADEVICE AUDIO_DEVICE_PLACEHOLDER

CHANNEL 0
MYCALL MYCALL_PLACEHOLDER

# 1200 baud Bell 202 AFSK — the standard for APRS VHF
MODEM 1200

# KISS over TCP — the Python decoder connects to this port
KISSPORT 8001
