syntax = "proto3";

package helios.config;

option go_package = "/config";

/*
 * Base ComponentTree.
 *
 * Represents a tree hierarchy of components.
 */
message ComponentTree {
  BaseComponent root = 1;  // Root component of the tree.
  string version = 2;  // Version of the component tree.
}

/*
 * Base Component.
 *
 * Represents an arbitrary component in the tree, can be a leaf or a branch.
 */
message BaseComponent {
  string name = 1;  // Name of the component.

  oneof node_type {
    Component leaf = 2;
    ComponentGroup branch = 3;
  }
}

/*
 * Leaf Component.
 *
 * The docker_spec is optional. If not present, it functionally acts as skip_spawn=true.
 */
message Component {
  optional DockerSpec docker_spec = 1;  // Docker specification for the component.
}

/*
 * Docker Container Specification.
 *
 * Detailed specification for spinning up the component's docker container.
 */
message DockerSpec {
  string image = 1;  // Image of the docker container.
  string tag = 2;  // Tag of the docker container.
  repeated Volume volumes = 3;  // Volumes to mount into the docker container.
  repeated Port ports = 4;  // Ports to expose from the docker container.
  string container_name = 5;  // Name of the docker container.
  bool skip_spawn = 6;  // If true, the component will not be spawned as a docker container.
}

/*
 * ComponentGroup.
 *
 * Represents a group of components.
 */
message ComponentGroup {
  repeated BaseComponent children = 1;  // Children components of the group.
}

/*
 * Docker Port Specification.
 *
 * Represents a port of the docker container.
 */
message Port {
  string type = 1;  // Type of the port.
  string source = 2;  // Source port of the port.
  string target = 3;  // Target port of the port.
  string read_only = 4;  // If true, the port will be read-only.
}

/*
 * Docker Volume Specification.
 *
 * Represents a volume of the docker container.
 */
message Volume {
  string source = 1;  // Source of the volume.
  string target = 2;  // Target of the volume.
  string mode = 3;  // Mode of the volume.
}
